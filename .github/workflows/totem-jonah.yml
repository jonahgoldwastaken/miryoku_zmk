name: "Jonah's Totem"
on: push
jobs:
  build:
    if: github.repository_owner == 'jonahgoldwastaken'
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["xiao_ble//zmk"]'
      shield: '["totem_left","totem_right","settings_reset"]'
      alphas: '["default"]'
      extra: '["qwerty"]'
      tap: '["default"]'
      nav: '["vi"]'
      clipboard: '["mac"]'
      layers: '["default"]'
      custom_config: '["#define MIRYOKU_KLUDGE_SOFT_OFF\n#define MIRYOKU_TIMELESS_HRM"]'
      kconfig: '["CONFIG_ZMK_PM_SOFT_OFF=y\nCONFIG_BT_CTLR_TX_PWR_PLUS_8=y"]'
